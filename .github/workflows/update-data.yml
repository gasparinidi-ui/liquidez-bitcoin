name: Atualizar dados de liquidez (Liquidez BTC)

on:
  schedule:
    # A cada hora, no minuto 5. Ajuste para */15 se quiser mais frequência
    # (repositórios públicos têm minutos ilimitados no GitHub Actions).
    - cron: '5 * * * *'
  workflow_dispatch: {}   # permite rodar manualmente pela aba Actions

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r scripts/requirements.txt

      - name: Rodar coletor de dados
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/data_collector.py

      - name: Commitar data_live.json (se houve mudança)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_live.json
          git diff --staged --quiet || git commit -m "chore: atualiza data_live.json [skip ci]"
          git push
